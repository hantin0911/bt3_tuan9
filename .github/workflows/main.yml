name: Maven CI for Bai03

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước quan trọng nhất: Lấy code từ repo về Runner
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Verify with Maven
        # ĐÃ SỬA: Bỏ --file Bai03/pom.xml vì pom.xml nằm ở gốc
        run: mvn -B verify

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bai03-artifact
          # ĐÃ SỬA: Đường dẫn đúng là target/ (không có Bai03/)
          path: target/*.jar